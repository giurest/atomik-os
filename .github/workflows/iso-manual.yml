name: Build Atomik OS ISO

on:
  workflow_dispatch:
    inputs:
      variant:
        description: "Variante da buildare in ISO"
        required: true
        default: "desktop"
        type: choice
        options:
          - desktop
#          - desktop-nvidia
#          - puregaming
#          - puregaming-nvidia
#          - handheld

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build-iso:
    name: ISO ${{ matrix.variant }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    strategy:
      fail-fast: false
      matrix:
        variant:
          - ${{ github.event.inputs.variant || 'desktop' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ISO with bootc-image-builder
        id: build-iso
        uses: jasonn3/build-container-installer@v1.2.3
        with:
          arch: x86_64
          image_name: atomik-${{ matrix.variant }}
          image_repo: ${{ env.IMAGE_REGISTRY }}
          image_tag: latest
          version: 44
          variant: Kinoite
          iso_name: atomik-${{ matrix.variant }}-latest.iso
          enrollment_password: atomikos

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: atomik-${{ matrix.variant }}-iso
          path: |
            ${{ steps.build-iso.outputs.iso_path }}
            ${{ steps.build-iso.outputs.iso_path }}.sha256
          retention-days: 14

