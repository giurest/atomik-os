name: Build Atomik OS ISO

on:
  workflow_dispatch:
    inputs:
      variant:
        description: "Variante da buildare in ISO"
        required: true
        default: "desktop"
        type: choice
        options:
          - desktop

env:
  IMAGE_NAME: atomik-${{ github.event.inputs.variant }}
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  DEFAULT_TAG: latest
  BIB_IMAGE: quay.io/centos-bootc/bootc-image-builder:latest

jobs:
  build-iso:
    name: ISO ${{ github.event.inputs.variant }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: read
      id-token: write

    steps:
      - name: Prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}
          USER_UID=$(id -u)
          USER_GID=$(id -g)
          echo "USER_UID=${USER_UID}" >> ${GITHUB_ENV}
          echo "USER_GID=${USER_GID}" >> ${GITHUB_ENV}

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ISO
        id: build
        uses: osbuild/bootc-image-builder-action@main
        with:
          builder-image: ${{ env.BIB_IMAGE }}
          config-file: ./installer/atomik.toml
          image: ghcr.io/giurest/atomik-desktop:latest
          chown: ${{ env.USER_UID }}:${{ env.USER_GID }}
          types: anaconda-iso
          additional-args: --use-librepo=True --rootfs xfs

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: atomik-${{ github.event.inputs.variant }}-iso
          path: ${{ steps.build.outputs.output-directory }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Upload ISO to Cubbit S3
        if: success()
        shell: bash
        env:
          RCLONE_CONFIG_S3_TYPE: s3
          RCLONE_CONFIG_S3_PROVIDER: ${{ secrets.S3_PROVIDER }}
          RCLONE_CONFIG_S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          RCLONE_CONFIG_S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_S3_REGION: ${{ secrets.S3_REGION }}
          RCLONE_CONFIG_S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
        run: |
          sudo apt-get install -y rclone
          rclone copy ${{ steps.build.outputs.output-directory }} S3:${{ secrets.S3_BUCKET_NAME }} \
            --s3-acl public-read \
            --progress