name: Build Atomik OS Images

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "containerfiles/Containerfile.server"
      - "build_files_server/**"
      - "files/ujust/server-justfile"
      - ".github/workflows/build-server.yml"
      - ".github/workflows/build-server-qcow2.yml"
      - "tools/**"
      - "containerfiles/Containerfile.hypervisor"
      - "build_files_hypervisor/**"
      - "files/system/etc/polkit-1/rules.d/50-libvirt-wheel.rules"
      - "files/fastfetch/hypervisor.jsonc"
      - ".github/workflows/build-hypervisor.yml"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "containerfiles/Containerfile.server"
      - "build_files_server/**"
      - "files/ujust/server-justfile"
      - ".github/workflows/build-server.yml"
      - ".github/workflows/build-server-qcow2.yml"
      - "tools/**"
      - "containerfiles/Containerfile.hypervisor"
      - "build_files_hypervisor/**"
      - "files/system/etc/polkit-1/rules.d/50-libvirt-wheel.rules"
      - "files/fastfetch/hypervisor.jsonc"
      - ".github/workflows/build-hypervisor.yml"
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch:

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Fase 1: immagine base desktop ──────────────────────────────────────────
  build-base:
    name: Build ${{ matrix.variant }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        variant:
          - desktop

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/atomik-${{ matrix.variant }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=schedule,pattern={{date 'YYYYMMDD'}}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        id: build
        uses: redhat-actions/buildah-build@v2
        with:
          image: atomik-${{ matrix.variant }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          containerfiles: ./containerfiles/Containerfile.${{ matrix.variant }}
          oci: true

      - name: Push image
        uses: redhat-actions/push-to-registry@v2
        id: push
        with:
          tags: ${{ steps.build.outputs.tags }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        if: github.event_name != 'pull_request'

      - name: Sign the image
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes ${{ env.IMAGE_REGISTRY }}/atomik-${{ matrix.variant }}@${{ steps.push.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: true

  # ── Fase 2: varianti derivate da desktop ───────────────────────────────────
  build-derived:
    name: Build ${{ matrix.variant }}
    runs-on: ubuntu-latest
    needs: build-base
    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        variant:
          - puregaming
          - desktop-nvidia

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/atomik-${{ matrix.variant }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=schedule,pattern={{date 'YYYYMMDD'}}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        id: build
        uses: redhat-actions/buildah-build@v2
        with:
          image: atomik-${{ matrix.variant }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          containerfiles: ./containerfiles/Containerfile.${{ matrix.variant }}
          oci: true

      - name: Push image
        uses: redhat-actions/push-to-registry@v2
        id: push
        with:
          tags: ${{ steps.build.outputs.tags }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        if: github.event_name != 'pull_request'

      - name: Sign the image
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes ${{ env.IMAGE_REGISTRY }}/atomik-${{ matrix.variant }}@${{ steps.push.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: true

  # ── Fase 3: varianti derivate da desktop-nvidia ────────────────────────────
  build-nvidia-derived:
    name: Build ${{ matrix.variant }}
    runs-on: ubuntu-latest
    needs: build-derived
    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        variant:
          - puregaming-nvidia

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/atomik-${{ matrix.variant }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=schedule,pattern={{date 'YYYYMMDD'}}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        id: build
        uses: redhat-actions/buildah-build@v2
        with:
          image: atomik-${{ matrix.variant }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          containerfiles: ./containerfiles/Containerfile.${{ matrix.variant }}
          oci: true

      - name: Push image
        uses: redhat-actions/push-to-registry@v2
        id: push
        with:
          tags: ${{ steps.build.outputs.tags }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        if: github.event_name != 'pull_request'

      - name: Sign the image
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes ${{ env.IMAGE_REGISTRY }}/atomik-${{ matrix.variant }}@${{ steps.push.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: true
