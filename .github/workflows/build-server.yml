name: Build Atomik OS Server
on:
  push:
    branches:
      - main
    paths:
      - "containerfiles/Containerfile.server"
      - "build_files_server/**"
      - "files/ujust/server.just"
      - "files/ujust/common.just"
      - ".github/workflows/build-server.yml"
  pull_request:
    branches:
      - main
    paths:
      - "containerfiles/Containerfile.server"
      - "build_files_server/**"
      - "files/ujust/server.just"
      - "files/ujust/common.just"
      - ".github/workflows/build-server.yml"
  workflow_dispatch:
env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build-server:
    name: Build server
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/atomik-server
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=schedule,pattern={{date 'YYYYMMDD'}}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        id: build
        uses: redhat-actions/buildah-build@v2
        with:
          image: atomik-server
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          containerfiles: ./containerfiles/Containerfile.server
          oci: true
      - name: Push image
        uses: redhat-actions/push-to-registry@v2
        id: push
        with:
          tags: ${{ steps.build.outputs.tags }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        if: github.event_name != 'pull_request'
      - name: Sign the image
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes ${{ env.IMAGE_REGISTRY }}/atomik-server@${{ steps.push.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: true
