[customizations.installer.kickstart]
contents = """
%post
cat > /etc/systemd/system/atomik-firstboot.service << 'EOF'
[Unit]
Description=Switch to Atomik OS on first boot
After=network-online.target
Wants=network-online.target
ConditionPathExists=!/var/lib/atomik-firstboot-done

[Service]
Type=oneshot
ExecStart=/usr/bin/bootc switch --mutate-in-place --transport registry ghcr.io/giurest/atomik-desktop:latest
ExecStartPost=/usr/bin/touch /var/lib/atomik-firstboot-done
ExecStartPost=/usr/bin/systemctl reboot
RemainAfterExit=yes

[Install]
WantedBy=multi-user.target
EOF
systemctl enable atomik-firstboot.service
%end
"""

[customizations.installer.modules]
enable = [
  "org.fedoraproject.Anaconda.Modules.Storage",
  "org.fedoraproject.Anaconda.Modules.Runtime",
  "org.fedoraproject.Anaconda.Modules.Network",
  "org.fedoraproject.Anaconda.Modules.Security",
  "org.fedoraproject.Anaconda.Modules.Services",
  "org.fedoraproject.Anaconda.Modules.Users",
  "org.fedoraproject.Anaconda.Modules.Timezone"
]
disable = [
  "org.fedoraproject.Anaconda.Modules.Subscription"
]